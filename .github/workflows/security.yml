name: Security Scan

on:
  pull_request:
  schedule:
    - cron: '0 14 * * 1'  # Monday 8am CST
  workflow_dispatch:

jobs:
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true
        continue-on-error: true

  sast:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/python
        continue-on-error: true

  notify-on-failure:
    name: Alert on Failure
    runs-on: ubuntu-latest
    needs: [secrets-scan, dependency-scan, sast]
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write
      contents: read
    steps:
      - name: Write failure summary
        run: |
          {
            echo "## 🛑 Weekly Security Scan Failed"
            echo ""
            echo "**Date:** $(date -u +%Y-%m-%d)"
            echo "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "### Job Status"
            echo "- Secrets Detection: ${{ needs.secrets-scan.result }}"
            echo "- Dependency Audit: ${{ needs.dependency-scan.result }}"
            echo "- Static Analysis: ${{ needs.sast.result }}"
            echo ""
            echo "### Next Steps"
            echo "1. Review job logs above"
            echo "2. Fix critical/high findings"
            echo "3. Re-run via workflow_dispatch to verify"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Issue (if Issues enabled)
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const repo = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            if (!repo.data.has_issues) {
              core.info('Issues disabled on this repo; skipping issue creation. See job summary.');
              return;
            }
            const title = `Weekly Security Scan Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Security Scan Alert\n\nThe weekly security scan found issues.\n\n**Run:** [View Details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n### Next Steps\n1. Review scan details\n2. Fix critical/high findings\n3. Close this issue when resolved`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'automated']
            });

      - name: Telegram alert (if configured)
        continue-on-error: true
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
        run: |
          MSG="🛑 *Security Scan Failed* — quickbooks-mcp-server%0A%0ARun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "message_thread_id=${TELEGRAM_TOPIC_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=Markdown" > /dev/null
